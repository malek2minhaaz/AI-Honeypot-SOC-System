<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        AI Security Assistant
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#0d1117;
            color:white;
            font-family:Arial;
        }

        .navbar{
            background:#161b22;
            border-bottom:1px solid #30363d;
        }

        .navbar-brand{
            color:#58a6ff !important;
            font-weight:bold;
        }

        .ai-box{
            background:#161b22;
            border:1px solid #30363d;
            border-radius:20px;
            padding:40px;
            margin-top:50px;
        }

        .title{
            color:#58a6ff;
            font-weight:bold;
            margin-bottom:20px;
        }

        textarea{
            background:#0d1117 !important;
            color:white !important;
            border:1px solid #30363d !important;
        }

        textarea:focus{
            box-shadow:none !important;
            border-color:#58a6ff !important;
        }

        .btn-ai{
            background:#238636;
            border:none;
            width:100%;
            padding:12px;
            font-weight:bold;
        }

        .response-box{
            background:#0d1117;
            border:1px solid #30363d;
            border-radius:15px;
            padding:20px;
            margin-top:30px;
            white-space:pre-wrap;
        }

        .loader{
            display:none;
            text-align:center;
            margin-top:20px;
            color:#58a6ff;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-dark px-4">

    <a class="navbar-brand"
       href="/">

        AI Security Assistant

    </a>

</nav>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="ai-box">

                <h2 class="title">
                    AI Threat Intelligence
                </h2>

                <p>
                    Ask AI about attacks,
                    vulnerabilities,
                    threat severity,
                    mitigation steps,
                    and security recommendations.
                </p>

                <textarea class="form-control"
                          id="question"
                          rows="5"
                          placeholder="Example: Analyze recent brute force attacks and provide mitigation recommendations"></textarea>

                <button class="btn btn-ai mt-3"
                        onclick="askAI()">

                    Analyze Threats

                </button>

                <div class="loader"
                     id="loader">

                    AI is analyzing threats...

                </div>

                <div class="response-box"
                     id="responseBox">

                    AI responses will appear here...

                </div>

            </div>

        </div>

    </div>

</div>

<script>

function askAI(){

    let question = document.getElementById("question").value;

    document.getElementById("loader").style.display = "block";

    fetch("/ask_ai", {

        method:"POST",

        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },

        body:"question=" + encodeURIComponent(question)

    })

    .then(response => response.json())

    .then(data => {

        document.getElementById("loader").style.display = "none";

        document.getElementById("responseBox").innerText =
            data.response;

    });

}

</script>

</body>

</html>
