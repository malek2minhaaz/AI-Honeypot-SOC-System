<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Secure Admin Portal
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#0d1117;
            color:white;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial;
            overflow:hidden;
        }

        .login-box{
            width:420px;
            background:#161b22;
            padding:40px;
            border-radius:20px;
            border:1px solid #30363d;
            box-shadow:0 0 25px rgba(0,255,150,0.2);
        }

        .title{
            text-align:center;
            margin-bottom:30px;
            color:#58a6ff;
            font-weight:bold;
        }

        .status{
            text-align:center;
            color:#00ff99;
            margin-bottom:15px;
            font-size:14px;
        }

        .form-control{
            background:#0d1117;
            border:1px solid #30363d;
            color:white;
        }

        .form-control:focus{
            background:#0d1117;
            color:white;
            border-color:#58a6ff;
            box-shadow:none;
        }

        .btn-login{
            width:100%;
            background:#238636;
            border:none;
            padding:12px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#2ea043;
            transform:scale(1.02);
        }

        .loader{
            display:none;
            text-align:center;
            margin-top:20px;
            color:#58a6ff;
            font-size:14px;
        }

        .warning{
            margin-top:20px;
            text-align:center;
            color:orange;
            font-size:13px;
        }

    </style>

</head>

<body>

<div class="login-box">

    <h2 class="title">
        Secure Admin Access
    </h2>

    <p class="status">
        ● SOC Monitoring Enabled
    </p>

    <form id="loginForm">

        <div class="mb-3">

            <input type="text"
                   class="form-control"
                   name="username"
                   placeholder="Admin Username"
                   required>

        </div>

        <div class="mb-3">

            <input type="password"
                   class="form-control"
                   name="password"
                   placeholder="Password"
                   required>

        </div>

        <button type="submit"
                class="btn btn-login">

            Authenticate

        </button>

    </form>

    <div class="loader"
         id="loader">

        Authenticating Secure Access...

    </div>

    <p class="warning">

        Unauthorized access attempts
        are monitored and logged.

    </p>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

    e.preventDefault();

    // SHOW LOADER
    document.getElementById("loader").style.display = "block";

    fetch("/login", {

        method:"POST",

        body:new FormData(
            document.getElementById("loginForm")
        )

    })

    .then(response => response.json())

    .then(data => {

        // HIDE LOADER
        document.getElementById("loader").style.display = "none";

        // ADMIN LOGIN
        if(data.status === "SUCCESS"){

            window.location.href = data.redirect;

        }

        // ATTACKER DETECTED
        else if(data.status === "CAPTURED"){

            window.location.href = data.redirect;

        }

    })

    .catch(error => {

        console.log(error);

        document.getElementById("loader").style.display = "none";

        alert("Authentication Error");

    });

});

</script>

</body>

</html>
