<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        User Registration
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#0d1117;
            color:white;
            font-family:Arial;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .signup-box{
            width:450px;
            background:#161b22;
            border:1px solid #30363d;
            border-radius:20px;
            padding:40px;
            box-shadow:0 0 25px rgba(0,255,150,0.1);
        }

        .title{
            color:#58a6ff;
            font-weight:bold;
            text-align:center;
            margin-bottom:30px;
        }

        .form-control{
            background:#0d1117;
            border:1px solid #30363d;
            color:white;
            margin-bottom:20px;
        }

        .form-control:focus{
            background:#0d1117;
            color:white;
            border-color:#58a6ff;
            box-shadow:none;
        }

        .btn-signup{
            width:100%;
            background:#238636;
            border:none;
            padding:12px;
            font-weight:bold;
            border-radius:10px;
        }

        .btn-signup:hover{
            background:#2ea043;
        }

        .message{
            text-align:center;
            margin-top:20px;
            color:#00ff99;
        }

        .login-link{
            text-align:center;
            margin-top:20px;
        }

        .login-link a{
            color:#58a6ff;
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="signup-box">

    <h2 class="title">
        Create Security Account
    </h2>

    <form method="POST"
          action="/signup">

        <input type="text"
               name="username"
               class="form-control"
               placeholder="Username"
               required>

        <input type="email"
               name="email"
               class="form-control"
               placeholder="Email Address"
               required>

        <input type="password"
               name="password"
               class="form-control"
               placeholder="Password"
               required>

        <input type="password"
               name="confirm_password"
               class="form-control"
               placeholder="Confirm Password"
               required>

        <button type="submit"
                class="btn btn-signup">

            Create Account

        </button>

    </form>

    {% if message %}

    <div class="message">

        {{ message }}

    </div>

    {% endif %}

    <div class="login-link">

        Already have an account?

        <a href="/user-login">

            Login

        </a>

    </div>

</div>

</body>

</html>
